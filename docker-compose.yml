services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: talent_platform
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d talent_platform"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    env_file: .env
    depends_on:
      user-service:
        condition: service_healthy
      candidate-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      API_GATEWAY_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_INTERNAL_URL: ${USER_SERVICE_INTERNAL_URL}
      CANDIDATE_SERVICE_INTERNAL_URL: ${CANDIDATE_SERVICE_INTERNAL_URL}
      NOTIFICATION_SERVICE_INTERNAL_URL: ${NOTIFICATION_SERVICE_INTERNAL_URL}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  user-service:
    build: ./services/user-service
    container_name: user-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USER_SERVICE_PORT: 8081
      JWT_SECRET: ${JWT_SECRET}
      USER_DB_URL: ${USER_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8081'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  ai-ranking-service:
    build: ./services/ai-ranking-service
    container_name: ai-ranking-service
    env_file: .env
    environment:
      AI_SERVICE_PORT: 8084
      USE_OPENAI: ${USE_OPENAI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8084)); s.close()\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    env_file: .env
    environment:
      NOTIFICATION_SERVICE_PORT: 8083
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8083'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  candidate-service:
    build: ./services/candidate-service
    container_name: candidate-service
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      ai-ranking-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    environment:
      CANDIDATE_SERVICE_PORT: 8082
      AI_SERVICE_URL: http://ai-ranking-service:8084
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      STORAGE_BASE_PATH: /app/storage
      CANDIDATE_DB_URL: ${CANDIDATE_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    volumes:
      - candidate-storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8082'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 25s

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      API_GATEWAY_UPSTREAM: http://api-gateway:8080
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  candidate-storage:
  postgres-data:
