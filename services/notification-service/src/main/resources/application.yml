server:
  port: ${NOTIFICATION_SERVICE_PORT:8083}

spring:
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

app:
  from: ${SMTP_FROM:noreply@talent-platform.local}
