server:
  port: ${CANDIDATE_SERVICE_PORT:8082}

spring:
  datasource:
    url: ${CANDIDATE_DB_URL:jdbc:postgresql://localhost:5432/talent_platform}
    username: ${DB_USERNAME:talent}
    password: ${DB_PASSWORD:talent123}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_candidate

services:
  ai-url: ${AI_SERVICE_URL:http://localhost:8084}
  notification-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}

storage:
  provider: ${STORAGE_PROVIDER:local}
  base-path: ${STORAGE_BASE_PATH:./storage}
  s3:
    bucket: ${STORAGE_S3_BUCKET:}
    region: ${AWS_REGION:us-east-1}
    endpoint: ${STORAGE_S3_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    path-style-access: ${STORAGE_S3_PATH_STYLE_ACCESS:false}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}

logging:
  level:
    root: INFO
